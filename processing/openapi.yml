openapi: 3.0.3
info:
  version: '1.0'
  title: Liga MX Soccer Match Event Analytics API
  description: Provides statistics generated by the processing service

paths:
  /stats:
    get:
      summary: Get the current event statistics
      operationId: app.get_stats
      responses:
        "200":
          description: Successfully returned statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventStats"
        "404":
          description: Statistics do not exist
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /health:
    get:
      tags:
        - health
      summary: Check health of the Processing service
      operationId: app.get_health
      description: Returns 200 if the Processing service is running
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

components:
  schemas:
    EventStats:
      type: object
      required:
        - num_match_summaries
        - num_betting_odds
        - max_home_goals
        - max_odds
        - last_updated
      properties:
        num_match_summaries:
          type: integer
          example: 0
        num_betting_odds:
          type: integer
          example: 0
        max_home_goals:
          type: integer
          example: 0
        max_odds:
          type: number
          example: 0
        last_updated:
          type: string
          format: date-time
          example: "2026-02-07T00:00:00Z"