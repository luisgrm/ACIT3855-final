services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/data

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1

      # Zookeeper connection
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      # Listeners:
      # - localhost:9092 for apps running on the VM (host)
      # - kafka:29092 for other containers on the docker network
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL

      # Single-broker safe defaults
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

      # Topic auto-create
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/kafka
    healthcheck:
      test: ["CMD-SHELL", "cub kafka-ready -b localhost:9092 1 30"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      kafka-topics
      --bootstrap-server kafka:29092
      --create
      --if-not-exists
      --topic events
      --partitions 1
      --replication-factor 1
    restart: "no"

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: storage_db
      MYSQL_USER: storage_user
      MYSQL_PASSWORD: storage_passwd
      MYSQL_ROOT_PASSWORD: root_passwd
    ports:
      - "3307:3306"
    volumes:
      - my-db:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  receiver:
    build:
      context: receiver
      dockerfile: Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      storage:
        condition: service_healthy
    expose:
      - "8080"
    deploy:
      replicas: 3
    restart: on-failure
    volumes:
      - ./config:/config
      - ./logs:/logs
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/receiver/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  storage:
    build:
      context: storage
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure
    volumes:
      - ./config:/config
      - ./logs:/logs
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/storage/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 70s

  processing:
    build:
      context: processing
      dockerfile: Dockerfile
    environment:
      CORS_ALLOW_ALL: "no"
    depends_on:
      storage:
        condition: service_healthy
    ports:
      - "8100:8100"
    restart: on-failure
    volumes:
      - ./config:/config
      - ./logs:/logs
      - ./data/processing:/data
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/processing/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  analyzer:
    build:
      context: analyzer
      dockerfile: Dockerfile
    environment:
      CORS_ALLOW_ALL: "no"
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8110:8110"
    restart: on-failure
    volumes:
      - ./config:/config
      - ./logs:/logs
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8110/analyzer/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s 

  dashboard-ui:
    build:
      context: ./dashboard-ui
    ports:
      - "80:80"
    depends_on:
      processing:
        condition: service_healthy
      analyzer:
        condition: service_healthy
      receiver:
        condition: service_healthy
      health:
        condition: service_healthy
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  health:
    build:
      context: ./health
      dockerfile: Dockerfile
    environment:
      CORS_ALLOW_ALL: "no"
    depends_on:
      receiver:
        condition: service_healthy
      storage:
        condition: service_healthy
      processing:
        condition: service_healthy
      analyzer:
        condition: service_healthy
    restart: on-failure
    ports:
      - "8120:8120"
    volumes:
      - ./config:/config
      - ./data:/data
      - ./logs:/logs
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8120/health/health-status', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  my-db:
  kafka-data:
  zookeeper-data: