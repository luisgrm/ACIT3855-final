server {
    listen 80;
    server_name _;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
    }

    location /receiver {
        proxy_pass http://receiver:8080;
    }

    location /processing {
        proxy_pass http://processing:8100;
    }

    location /analyzer {
        proxy_pass http://analyzer:8110;
    }

    location /health {
        proxy_pass http://health:8120;
    }
}